name: CI

on:
    push:
        branches: [ "main" ]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Docker Compose
              uses: docker/setup-compose-action@v2

            - name: Prepare environment
              run: |
                  echo "NGINX_PORT=82" >> .env

                  cat << EOF > .env.local
                  DATABASE_URL="postgresql://pguser:pguser@postgres:5432/study_on_billing?serverVersion=18.0.0&charset=utf8"
                  JWT_SECRET_KEY="%kernel.project_dir%/config/jwt/private.pem"
                  JWT_PUBLIC_KEY="%kernel.project_dir%/config/jwt/public.pem"
                  JWT_PASSPHRASE="1234abcd"
                  MAILER_DSN="smtp://mailhog:1025"
                  EOF

                  cat << EOF > .env.test.local
                  DATABASE_URL="postgresql://pguser:pguser@postgres:5432/study_on_billing?serverVersion=18.0.0&charset=utf8"
                  JWT_SECRET_KEY="%kernel.project_dir%/config/jwt/private.pem"
                  JWT_PUBLIC_KEY="%kernel.project_dir%/config/jwt/public.pem"
                  JWT_PASSPHRASE="1234abcd"
                  MAILER_DSN="smtp://mailhog:1025"
                  EOF

            - name: Build Docker
              run: |
                  docker compose up -d --build
                  docker ps -a

            - name: Install backend dependencies
              run: |
                  docker compose exec -T php git config --global --add safe.directory /app
                  docker compose exec -T php composer install --no-interaction --prefer-dist

            - name: Generate JWT keys
              run: |
                  docker compose exec -T php mkdir -p config/jwt
                  docker compose exec -T php php bin/console lexik:jwt:generate-keypair --overwrite

            - name: Prepare test database
              run: |
                  docker compose exec -T php php bin/console doctrine:database:drop --force --env=test || true
                  docker compose exec -T php php bin/console doctrine:database:create --env=test
                  docker compose exec -T php php bin/console doctrine:migrations:migrate -n --env=test
                  docker compose exec -T php php bin/console doctrine:fixtures:load -n --env=test

            - name: Run PHPUnit
              run: |
                  docker compose exec -T php php bin/phpunit
